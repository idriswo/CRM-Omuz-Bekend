services:
  - type: web
    name: omuz-crm-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npx prisma db seed && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: omuz-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 3h
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: SEED_DIRECTOR_PHONE
        value: 900000000
      - key: SEED_DIRECTOR_PASSWORD
        value: "Director@2026!"
      - key: PORT
        value: 4000

databases:
  - name: omuz-crm-db
    plan: free
    databaseName: omuz_crm
    user: omuz_crm
